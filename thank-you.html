<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תודה! | OMS AI</title>
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --nav-h: 96px;
      --bg: #0d1b3e;
      --surface: #0a1530;
      --card: #112040;
      --border: rgba(255,255,255,0.1);
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --text: #f8faff;
      --muted: #b0c4de;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Rubik', sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }

    /* NAVBAR */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-h);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 36px; direction: ltr;
    }
    .nav-brand { display: flex; align-items: center; gap: 18px; }
    .nav-brand img { height: 84px; object-fit: contain; }
    .nav-slogan { display: flex; flex-direction: column; gap: 4px; }
    .nav-slogan-main { font-size: 20px; font-weight: 300; color: #0B2447; letter-spacing: 0.5px; direction: ltr; line-height: 1; }
    .nav-slogan-main b { font-weight: 700; }
    .nav-slogan-sub { font-size: 11.5px; color: rgba(0,0,0,0.6); font-weight: 300; direction: ltr; white-space: nowrap; }

    /* MAIN */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: calc(var(--nav-h) + 60px) 24px 80px;
      text-align: center; position: relative; overflow: hidden;
    }
    main::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse at 50% 40%, rgba(56,189,248,0.09) 0%, transparent 65%);
      pointer-events: none;
    }

    .thankyou-wrap { max-width: 520px; position: relative; }

    .check-circle {
      width: 88px; height: 88px; border-radius: 50%;
      background: rgba(56,189,248,0.12);
      border: 2px solid rgba(56,189,248,0.35);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 36px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    .check-circle svg { width: 44px; height: 44px; stroke: var(--accent); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: clamp(36px, 6vw, 56px); font-weight: 900;
      margin-bottom: 16px; letter-spacing: -0.5px;
      animation: fadeUp 0.5s 0.15s ease both;
    }
    .sub {
      font-size: 19px; color: var(--accent); font-weight: 500;
      margin-bottom: 20px;
      animation: fadeUp 0.5s 0.22s ease both;
    }
    p {
      font-size: 16px; color: var(--muted); line-height: 1.8; font-weight: 300;
      margin-bottom: 44px;
      animation: fadeUp 0.5s 0.3s ease both;
    }
    .actions {
      display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
      animation: fadeUp 0.5s 0.38s ease both;
    }
    .btn-primary {
      background: var(--accent); color: #fff; padding: 14px 34px;
      border-radius: 10px; font-size: 16px; font-weight: 700;
      font-family: 'Rubik', sans-serif; transition: all 0.2s; display: inline-block;
    }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(56,189,248,0.25); }
    .btn-secondary {
      background: transparent; color: var(--text); padding: 14px 28px;
      border-radius: 10px; font-size: 16px; font-weight: 500;
      border: 1px solid rgba(255,255,255,0.18); transition: all 0.2s; display: inline-block;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

    /* FOOTER */
    footer {
      background: #060E1F; border-top: 1px solid rgba(255,255,255,0.08);
      padding: 32px 40px; text-align: center;
    }
    footer p { font-size: 12px; color: rgba(255,255,255,0.25); }

    @media (max-width: 600px) {
      :root { --nav-h: 68px; }
      #navbar { padding: 0 16px; }
      .nav-brand img { height: 56px; }
      .nav-slogan { display: none; }
      .check-circle { width: 72px; height: 72px; margin-bottom: 28px; }
      h1 { font-size: 32px; }
      .sub { font-size: 17px; }
      footer { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<nav id="navbar">
  <div class="nav-brand">
    <a href="/"><img src="logo.png" alt="OMS AI" /></a>
    <div class="nav-slogan">
      <span class="nav-slogan-main"><b>O</b>ne <b>M</b>an <b>S</b>ystem <b>AI</b></span>
      <span class="nav-slogan-sub">בניית מוצרים - מערכות, אפליקציות ואתרים באמצעות יכולות הבינה המלאכותית. AI-NATIVE</span>
    </div>
  </div>
</nav>

<main>
  <div class="thankyou-wrap">
    <div class="check-circle">
      <svg viewBox="0 0 48 48">
        <polyline points="10,26 20,36 38,16"/>
      </svg>
    </div>
    <h1>תודה!</h1>
    <p class="sub">קיבלנו את פרטיך</p>
    <p>נציג מטעם OMS AI יחזור אליך בהקדם בוואטסאפ.<br/>נשמח לענות על כל שאלה ולתאם הדגמה אישית.</p>
    <div class="actions">
      <a href="/" class="btn-primary">חזרה לדף הבית</a>
      <a href="/your-meeting" class="btn-secondary">חזרה לדף המוצר</a>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 OMS AI · כל הזכויות שמורות · ישראל</p>
</footer>

</body>
</html>
