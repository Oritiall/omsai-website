<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orit Alloush — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #999999;
      --border: #e8e8e8;
      --hover: #f7f7f7;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      font-family: var(--font);
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left .name {
      font-size: 15px;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .header-left .sub {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tag-editing {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
    }

    /* ── Buttons ── */
    button {
      font-family: var(--font);
      font-weight: 300;
      font-size: 12px;
      cursor: pointer;
      border: none;
      background: none;
      letter-spacing: 0.04em;
    }

    .btn {
      padding: 8px 18px;
      transition: all 0.18s;
    }

    .btn-outline {
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--text); color: var(--text); }

    .btn-solid {
      background: var(--text);
      color: #fff;
    }
    .btn-solid:hover { opacity: 0.75; }

    /* ── Layout ── */
    .layout {
      display: flex;
      min-height: calc(100vh - 64px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 210px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 36px 0;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 28px;
      margin-bottom: 12px;
    }

    .cat-list { list-style: none; }

    .cat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 28px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.14s;
      gap: 8px;
    }

    .cat-item:hover { background: var(--hover); color: var(--text); }
    .cat-item.active { border-left-color: var(--text); color: var(--text); background: var(--hover); }

    .cat-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .cat-count { font-size: 11px; color: var(--muted); }

    .cat-share {
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 7px;
      opacity: 0;
      transition: opacity 0.14s;
      background: none;
      cursor: pointer;
      font-family: var(--font);
    }
    .cat-item:hover .cat-share { opacity: 1; }
    .cat-share:hover { border-color: var(--text); color: var(--text); }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 40px 48px;
      min-width: 0;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .main-title {
      font-size: 13px;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .main-actions { display: flex; gap: 10px; align-items: center; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      border: 1px solid var(--border);
      transition: border-color 0.18s;
      position: relative;
      overflow: hidden;
    }
    .card:hover { border-color: #ccc; }

    .card-media {
      aspect-ratio: 16 / 10;
      background: var(--hover);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .media-placeholder {
      text-align: center;
      color: var(--muted);
    }

    .media-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }
    .media-label { font-size: 11px; letter-spacing: 0.08em; }

    .card-body { padding: 16px 18px 18px; }

    .card-cat {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .card-title {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 10px;
    }

    .card-link {
      font-size: 12px;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      transition: border-color 0.16s;
      letter-spacing: 0.02em;
    }
    .card-link:hover { border-color: var(--text); }

    .card-actions {
      position: absolute;
      top: 9px;
      right: 9px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.16s;
    }
    .card:hover .card-actions { opacity: 1; }

    .card-btn {
      width: 28px;
      height: 28px;
      background: white;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.14s;
      font-family: var(--font);
    }
    .card-btn:hover { background: var(--hover); border-color: var(--text); }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 90px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 18px; opacity: 0.3; }
    .empty-text { font-size: 13px; line-height: 1.8; }

    /* ── Modal base ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: white;
      border: 1px solid var(--border);
      width: 500px;
      max-width: 92vw;
      max-height: 88vh;
      overflow-y: auto;
      transform: translateY(10px);
      transition: transform 0.2s;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-head {
      padding: 22px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-head-title { font-size: 14px; letter-spacing: 0.03em; }
    .modal-close {
      font-size: 22px;
      line-height: 1;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font);
    }
    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 28px; }
    .modal-foot {
      padding: 18px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input, select, textarea {
      width: 100%;
      font-family: var(--font);
      font-weight: 300;
      font-size: 13px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      outline: none;
      transition: border-color 0.16s;
      letter-spacing: 0.02em;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--text); }

    textarea { resize: vertical; min-height: 76px; }
    select { appearance: none; cursor: pointer; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 1px dashed var(--border);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.16s;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--text); }

    .upload-hint { font-size: 12px; color: var(--muted); line-height: 1.7; }

    .upload-preview { margin-top: 14px; }
    .upload-preview img, .upload-preview video {
      max-width: 100%;
      max-height: 140px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    .upload-name {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Share input ── */
    .share-input {
      background: var(--hover);
      cursor: pointer;
      letter-spacing: 0.01em;
    }
    .share-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--text);
      color: white;
      font-size: 12px;
      letter-spacing: 0.04em;
      padding: 10px 22px;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      header { padding: 0 20px; }
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        height: auto;
        position: static;
        padding: 16px 0;
      }
      .cat-item { padding: 8px 20px; }
      .main { padding: 24px 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <div class="name">Orit Alloush</div>
    <div class="sub">Portfolio</div>
  </div>
  <div class="header-right">
    <span class="tag-editing" id="editingTag" style="display:none">editing</span>
    <button class="btn btn-outline" id="adminBtn" onclick="toggleAdmin()">Admin</button>
    <button class="btn btn-solid" id="addBtn" style="display:none" onclick="openAddModal()">+ Add Work</button>
  </div>
</header>

<!-- ── Layout ── -->
<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-section-label">Categories</div>
    <ul class="cat-list" id="catList"></ul>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="main-header">
      <div class="main-title" id="mainTitle">All Work</div>
      <div class="main-actions">
        <button class="btn btn-outline" style="font-size:11px;padding:6px 14px;" onclick="shareView()">Share this view</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </main>

</div>

<!-- ── Add / Edit Modal ── -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-title" id="formTitle">Add Work</div>
      <button class="modal-close" onclick="closeFormModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">

      <div class="form-group">
        <label>Category</label>
        <select id="fCategory"></select>
      </div>

      <div class="form-group">
        <label>Title</label>
        <input type="text" id="fTitle" placeholder="Project title">
      </div>

      <div class="form-group">
        <label>Description <span style="text-transform:none;letter-spacing:0;font-size:10px;color:#bbb">— optional</span></label>
        <textarea id="fDesc" placeholder="Brief description"></textarea>
      </div>

      <div class="form-group">
        <label>Link / URL <span style="text-transform:none;letter-spacing:0;font-size:10px;color:#bbb">— optional</span></label>
        <input type="url" id="fUrl" placeholder="https://...">
      </div>

      <div class="form-group">
        <label>Image or Video <span style="text-transform:none;letter-spacing:0;font-size:10px;color:#bbb">— optional, max 5 MB</span></label>
        <div
          class="upload-zone"
          id="uploadZone"
          onclick="document.getElementById('fileInput').click()"
          ondragover="onDragOver(event)"
          ondragleave="onDragLeave(event)"
          ondrop="onDrop(event)"
        >
          <input type="file" id="fileInput" accept="image/*,video/*" style="display:none" onchange="onFileChange(event)">
          <div class="upload-hint">Click to upload or drag & drop<br>Images · Video</div>
          <div class="upload-preview" id="uploadPreview"></div>
          <div class="upload-name" id="uploadName"></div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeFormModal()">Cancel</button>
      <button class="btn btn-solid" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- ── Share Modal ── -->
<div class="overlay" id="shareOverlay">
  <div class="modal" style="width:420px">
    <div class="modal-head">
      <div class="modal-head-title">Share</div>
      <button class="modal-close" onclick="closeShareModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Link to this view</label>
        <input class="share-input" id="shareUrl" type="text" readonly onclick="copyUrl()">
      </div>
      <div class="share-hint">Click the field to copy the link</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-solid" onclick="copyUrl()">Copy Link</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
// ── Categories ──────────────────────────────────────────────────────────────
const CATS = [
  { id: 'all',                 label: 'All Work',             icon: '○' },
  { id: 'still-photography',   label: 'Still Photography',    icon: '◻' },
  { id: 'video-photography',   label: 'Video Photography',    icon: '▷' },
  { id: 'still-photo-editing', label: 'Still Photo Editing',  icon: '◈' },
  { id: 'video-editing',       label: 'Video Editing',        icon: '◑' },
  { id: 'ai-editing',          label: 'AI Editing',           icon: '◇' },
  { id: 'ai-images',           label: 'AI Images',            icon: '✦' },
];

const catById = id => CATS.find(c => c.id === id);

// ── Storage ──────────────────────────────────────────────────────────────────
function load() {
  try { return JSON.parse(localStorage.getItem('orit_portfolio') || '[]'); }
  catch { return []; }
}
function persist(items) {
  localStorage.setItem('orit_portfolio', JSON.stringify(items));
}

// ── State ────────────────────────────────────────────────────────────────────
let items       = load();
let activeCat   = 'all';
let adminMode   = false;
let pendingFile = null; // base64 data url

// ── Boot ─────────────────────────────────────────────────────────────────────
(function init() {
  const hash = location.hash.slice(1);
  if (hash && catById(hash)) activeCat = hash;
  renderSidebar();
  renderGrid();
})();

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1);
  if (catById(hash)) { activeCat = hash; renderSidebar(); renderGrid(); }
});

// ── Admin ────────────────────────────────────────────────────────────────────
function toggleAdmin() {
  adminMode = !adminMode;
  document.getElementById('addBtn').style.display      = adminMode ? '' : 'none';
  document.getElementById('editingTag').style.display  = adminMode ? '' : 'none';
  document.getElementById('adminBtn').textContent      = adminMode ? 'Done' : 'Admin';
  renderGrid();
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('catList').innerHTML = CATS.map(cat => {
    const count = cat.id === 'all' ? items.length : items.filter(i => i.category === cat.id).length;
    const active = activeCat === cat.id ? 'active' : '';
    const shareBtn = cat.id !== 'all'
      ? `<button class="cat-share" onclick="shareCategory('${cat.id}',event)">share</button>` : '';
    return `
      <li class="cat-item ${active}" onclick="setCategory('${cat.id}')">
        <span>${cat.label}</span>
        <span class="cat-right">
          <span class="cat-count">${count}</span>
          ${shareBtn}
        </span>
      </li>`;
  }).join('');
}

function setCategory(id) {
  activeCat = id;
  location.hash = id === 'all' ? '' : id;
  renderSidebar();
  renderGrid();
}

// ── Grid ─────────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  document.getElementById('mainTitle').textContent = catById(activeCat)?.label || 'All Work';

  const filtered = activeCat === 'all' ? items : items.filter(i => i.category === activeCat);

  if (!filtered.length) {
    const cat = catById(activeCat);
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">${cat?.icon || '○'}</div>
        <div class="empty-text">${adminMode
          ? 'No items yet.<br>Click <em>+ Add Work</em> to get started.'
          : 'No items in this category yet.'}</div>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => {
    const cat = catById(item.category);
    const media = item.thumbnail
      ? (item.thumbnail.startsWith('data:video')
          ? `<video src="${item.thumbnail}" muted loop playsinline></video>`
          : `<img src="${item.thumbnail}" alt="${esc(item.title)}" loading="lazy">`)
      : `<div class="media-placeholder">
           <div class="media-icon">${cat?.icon || '○'}</div>
           <div class="media-label">${cat?.label || ''}</div>
         </div>`;

    const adminBtns = adminMode ? `
      <div class="card-actions">
        <button class="card-btn" title="Edit" onclick="openEditModal('${item.id}')">✎</button>
        <button class="card-btn" title="Delete" onclick="deleteItem('${item.id}')">×</button>
      </div>` : '';

    return `
      <div class="card">
        <div class="card-media">${media}</div>
        ${adminBtns}
        <div class="card-body">
          <div class="card-cat">${cat?.label || item.category}</div>
          <div class="card-title">${esc(item.title)}</div>
          ${item.description ? `<div class="card-desc">${esc(item.description)}</div>` : ''}
          ${item.url ? `<a class="card-link" href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">View →</a>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ── Form modal ───────────────────────────────────────────────────────────────
function openAddModal() {
  resetForm();
  document.getElementById('formTitle').textContent = 'Add Work';
  if (activeCat !== 'all') document.getElementById('fCategory').value = activeCat;
  openOverlay('formOverlay');
}

function openEditModal(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  resetForm();
  document.getElementById('formTitle').textContent = 'Edit Work';
  document.getElementById('editId').value     = item.id;
  document.getElementById('fCategory').value  = item.category;
  document.getElementById('fTitle').value     = item.title;
  document.getElementById('fDesc').value      = item.description || '';
  document.getElementById('fUrl').value       = item.url || '';
  if (item.thumbnail) {
    pendingFile = item.thumbnail;
    showPreview(item.thumbnail, '');
  }
  openOverlay('formOverlay');
}

function resetForm() {
  document.getElementById('editId').value = '';
  document.getElementById('fTitle').value = '';
  document.getElementById('fDesc').value  = '';
  document.getElementById('fUrl').value   = '';
  document.getElementById('uploadPreview').innerHTML = '';
  document.getElementById('uploadName').textContent  = '';
  document.getElementById('fileInput').value = '';
  pendingFile = null;

  const sel = document.getElementById('fCategory');
  sel.innerHTML = CATS.filter(c => c.id !== 'all')
    .map(c => `<option value="${c.id}">${c.label}</option>`).join('');
}

function closeFormModal() { closeOverlay('formOverlay'); }

function saveItem() {
  const title    = document.getElementById('fTitle').value.trim();
  const category = document.getElementById('fCategory').value;
  const desc     = document.getElementById('fDesc').value.trim();
  const url      = document.getElementById('fUrl').value.trim();
  const id       = document.getElementById('editId').value;

  if (!title) { toast('Please enter a title.'); return; }

  if (id) {
    const item = items.find(i => i.id === id);
    if (item) {
      item.title       = title;
      item.category    = category;
      item.description = desc;
      item.url         = url;
      if (pendingFile !== null) item.thumbnail = pendingFile;
    }
  } else {
    items.unshift({
      id:          Date.now().toString(36),
      title, category, description: desc, url,
      thumbnail:   pendingFile,
      createdAt:   Date.now(),
    });
  }

  persist(items);
  closeFormModal();
  renderSidebar();
  renderGrid();
  toast('Saved.');
}

function deleteItem(id) {
  if (!confirm('Remove this item?')) return;
  items = items.filter(i => i.id !== id);
  persist(items);
  renderSidebar();
  renderGrid();
  toast('Removed.');
}

// ── File upload ───────────────────────────────────────────────────────────────
function onDragOver(e)  { e.preventDefault(); document.getElementById('uploadZone').classList.add('drag-over'); }
function onDragLeave()  { document.getElementById('uploadZone').classList.remove('drag-over'); }
function onDrop(e)      { e.preventDefault(); onDragLeave(); handleFile(e.dataTransfer.files[0]); }
function onFileChange(e){ handleFile(e.target.files[0]); }

function handleFile(file) {
  if (!file) return;
  if (!file.type.startsWith('image/') && !file.type.startsWith('video/')) {
    toast('Please upload an image or video file.'); return;
  }
  if (file.size > 5 * 1024 * 1024) {
    toast('File too large — max 5 MB. Add a URL link instead.'); return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    pendingFile = e.target.result;
    showPreview(pendingFile, file.name);
  };
  reader.readAsDataURL(file);
}

function showPreview(src, name) {
  const prev = document.getElementById('uploadPreview');
  if (src.startsWith('data:video')) {
    prev.innerHTML = `<video src="${src}" controls style="max-width:100%;max-height:140px"></video>`;
  } else {
    prev.innerHTML = `<img src="${src}" alt="">`;
  }
  document.getElementById('uploadName').textContent = name;
}

// ── Share ─────────────────────────────────────────────────────────────────────
function shareView()             { doShare(activeCat); }
function shareCategory(id, e)   { e.stopPropagation(); doShare(id); }

function doShare(catId) {
  const base = location.origin + location.pathname;
  const url  = catId === 'all' ? base : `${base}#${catId}`;
  document.getElementById('shareUrl').value = url;
  openOverlay('shareOverlay');
}

function closeShareModal() { closeOverlay('shareOverlay'); }

function copyUrl() {
  const val = document.getElementById('shareUrl').value;
  navigator.clipboard.writeText(val)
    .then(() => toast('Link copied!'))
    .catch(() => {
      document.getElementById('shareUrl').select();
      document.execCommand('copy');
      toast('Link copied!');
    });
}

// ── Overlay helpers ───────────────────────────────────────────────────────────
function openOverlay(id)  { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

document.getElementById('formOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeFormModal();
});
document.getElementById('shareOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeShareModal();
});

// ── Toast ─────────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return (s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
